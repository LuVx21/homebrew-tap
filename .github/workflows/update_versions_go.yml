name: 更新 Homebrew Formula & Cask Versions

on:
  schedule:
    - cron: '0 20,8 * * *'  # Run every Monday at 6 AM UTC
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'Casks/**'
      - 'Formula/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Casks/**'
      - 'Formula/**'

jobs:
  update-versions:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: 安装Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: 运行Go代码
        id: update
        run: |
          go run ./scripts/update_versions.go
          echo "changes=$(git diff --name-only | wc -l)" >> $GITHUB_OUTPUT
          # if git diff --quiet; then
          #   echo "has_changes=false" >> $GITHUB_OUTPUT
          # else
          #   echo "has_changes=true" >> $GITHUB_OUTPUT
          # fi
      - name: 提交更新
        if: steps.update.outputs.changes != '0'
        # if: steps.update.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "🤖 Update Formula and Cask versions (Go)

          Co-Authored-By: GitHub Action <action@github.com>"
          git push
      - name: 无新版本
        if: steps.update.outputs.changes == '0'
        run: |
          echo "No version updates needed"

  notify:
    runs-on: ubuntu-latest
    needs: update-versions
    if: always()
    steps:
      - name: 提醒
        run: |
          echo "Job finished with status: ${{ needs.update-versions.result }}"
